units:
  # padding
  px: u + 4
  py: u + 4
  # half tile
  hu: u / 2
  # half padding
  hx: px / 2
  hy: py / 2
  # case padding
  cs: 3
points:
  zones:
    matrix:
      anchor:
        shift: [100, -200]
      columns:
        macro:
          key.column_net: P002
        outer:
          key.column_net: P115
        pinky:
          key.stagger: 3
          key.column_net: P113
        ring:
          key.column_net: P111
          key.stagger: 3
        middle:
          key.column_net: P010
          key.stagger: 5
        index:
          key.column_net: P009
          key.stagger: -5
        inner:
          key.column_net: P031
          key.stagger: -6
      rows:
        space:
          row_net: P020
        bottom:
          row_net: P022
        home:
          row_net: P024
        top:
          row_net: P100
        num:
          row_net: P017
  mirror:
    ref: matrix_inner_num
    distance: 2u
outlines:
  keys:
    - where: true
      what: rectangle
      size: [14, 14]
  rightboard:
    - what: polygon
      operation: stack
      points:
        - ref: mirror_matrix_macro_num
          shift: [-0.5px, 0.5py]
        - ref: mirror_matrix_pinky_num
          shift: [-hx, 0.5py-3]
        - ref: mirror_matrix_ring_num
          shift: [hu, hy+5]
        - ref: mirror_matrix_index_num
          shift: [-hu, hy + 5]
        - ref: mirror_matrix_inner_num
          shift: [hx, hy]
        - ref: mirror_matrix_inner_space
          shift: [hx, -hy]
        - ref: mirror_matrix_pinky_space
          shift: [hx, -hy-3]
        - ref: mirror_matrix_macro_space
          shift: [-hx, -hy]
      fillet: 2
  rightcutout:
    - name: rightboard
    - operation: subtract
      name: keys
  rightcase:
    - what: polygon
      operation: stack
      points:
        - ref: mirror_matrix_macro_num
          shift: [-0.5px-cs, 0.5py+cs]
        - ref: mirror_matrix_pinky_num
          shift: [-hx-cs, 0.5py-3+cs]
        - ref: mirror_matrix_ring_num
          shift: [hu-cs, hy+5+cs]
        - ref: mirror_matrix_index_num
          shift: [-hu+cs, hy + 5+cs]
        - ref: mirror_matrix_inner_num
          shift: [hx+cs, hy+cs]
        - ref: mirror_matrix_inner_space
          shift: [hx+cs, -hy-cs]
        - ref: mirror_matrix_macro_space
          shift: [-hx-cs, -hy-cs]
      # fillet: 2
  rightcasecutout:
    - name: rightcase
    - operation: subtract
      name: keys
pcbs:
  right:
    outlines:
      main:
        outline: rightboard
    footprints:
      # main keys and diodes; omit special cases.
      mx_hotswap:
        where: /^mirror_matrix_(?!(?:index_num|index_top|inner_top)).*/
        what: mx
        params:
          keycaps: true
          hotswap: true
          from: "{{column_net}}"
          to: "{{colrow}}"
      diode:
        where: /^mirror_matrix_(?!(?:index_num|index_top|inner_num|inner_top)).*/
        what: diode
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
        adjust:
          shift: [0, -5]
      # hotswap near controller need to flip 180 to clear pins
      mx_hotswap_near_controller:
        where: /^mirror_matrix_(?:index_num|index_top|inner_top).*/
        what: mx
        params:
          keycaps: true
          hotswap: true
          from: "{{column_net}}"
          to: "{{colrow}}"
        adjust:
          rotate: -180
      # diodes need to be shifted to dodge controller; some are flipped for trace convenience
      diode_1:
        where: /^mirror_matrix_(?:index_top).*/
        what: diode
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
        adjust:
          shift: [0, 5]
          rotate: 0
      diode_2:
        where: /^mirror_matrix_index_num.*/
        what: diode
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
        adjust:
          shift: [0, 8]
          rotate: 180
      diode_3:
        where: /^mirror_matrix_inner_num.*/
        what: diode
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
        adjust:
          shift: [0, -hu]
          rotate: 180
      diode_4:
        where: /^mirror_matrix_inner_top.*/
        what: diode
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
        adjust:
          shift: [0, 5]
          rotate: 180
      # microcontroller
      nice_nano:
        what: nice_nano
        params:
          orientation: up
        where:
          ref: mirror_matrix_inner_num
          shift: [-hu+1.5, 2.5]
          rotate: 0
      # battery jack
      jstph:
        what: jstph
        where:
          ref: mirror_matrix_inner_home
          shift: [hu, hu-0.5]
          rotate: -90
        params:
          side: B
          pos: pos
          neg: GND
      # Reset switch (horizontal community version)
      horizontal_reset:
        what: EVQPUC
        params:
          side: B
          from: GND
          to: RST
        where:
          ref: mirror_matrix_inner_top
          shift: [hu, 0]
          rotate: -90
      # Battery on/off switch
      battery_switch:
        what: slider
        where:
          ref: mirror_matrix_inner_top
          shift: [hu, hu]
          rotate: -90
        params:
          side: B
          from: pos
          to: RAW
      # Write "Icarus" on the PCB
      front_text: &text
        what: text
        where: &textWhere
          ref: mirror_matrix_middle_space
          shift: [0, -hy-7.2]
        params: &textParams
          text: Icarus
          justify: left
          h_size: 6.0
          v_size: 6.0
          thickness: 0.8
          style: Hasklug Nerd Font Mono
      # holes in PCB
      hole_bottom_left:
        what: mountinghole
        where:
          ref: mirror_matrix_macro_space
          shift: [hu, hu]
      hole_top_left:
        what: mountinghole
        where:
          ref: mirror_matrix_macro_num
          shift: [hu, -hu]
      hole_center:
        what: mountinghole
        where:
          ref: mirror_matrix_middle_home
          shift: [-hu, -hu]
      hole_top_right:
        what: mountinghole
        where:
          ref: mirror_matrix_inner_num
          shift: [-hu, -hu]
      hole_bottom_right:
        what: mountinghole
        where:
          ref: mirror_matrix_inner_space
          shift: [-hu, hu+4]
