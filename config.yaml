points:
  zones:
    matrix:
      columns:
        macro:
          key.column_net: P017
        outer:
          key.column_net: P020
        pinky:
          key.stagger: 3
          key.column_net: P022
        ring:
          key.column_net: P024
          key.stagger: 3
        middle:
          key.column_net: P100
          key.stagger: 5
        index:
          key.column_net: P011
          key.stagger: -5
        inner:
          key.column_net: P104
          key.stagger: -6
      rows:
        space:
          row_net: P113
        bottom:
          row_net: P115
        home:
          row_net: P002
        top:
          row_net: P029
        num:
          row_net: P031
  mirror:
    ref: matrix_inner_home
    distance: 30
outlines:
  left:
    - where: true
      what: rectangle
      size: [u + 2, u+2]
      fillet: 2
  leftkeys:
    - where: true
      what: rectangle
      size: [14 , 14]
  leftcutout:
    - name: left
    - operation: subtract
      name: leftkeys
pcbs:
  left:
    outlines:
      main:
        outline: left
    footprints:
      keyswitches:
        where: true
        what: mx
        params:
          hotswap: true
          from: "{{col_net}}"
          to: "{{colrow}}"
      nice_nano:
        what: nice_nano
        params:
          orientation: up
        where:
          ref: matrix_inner_num
          shift: [-9, -2]
